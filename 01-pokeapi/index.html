<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<script src="index.js" defer></script>

	<title>Pokemons</title>
</head>

<body class="min-h-screen bg-slate-100 p-4 md:p-8">

	<div class="min-h-[calc(100vh-4rem)] rounded-3xl border-2 border-slate-800 bg-white">

		<header class="rounded-t-[21px] border-b border-slate-800 bg-blue-600 p-6 text-blue-100 shadow-lg md:p-8">
			<div class="flex items-start justify-between gap-4">
				<div>
					<h1 class="text-3xl font-bold md:text-4xl">Pokemons</h1>
					<h3 class="mt-5 text-sm font-semibold md:text-base">
						All the Pokémon data you'll ever need in one place, easily accessible through a modern free open-source RESTful API.
					</h3>
				</div>
			</div>
		</header>

		<main class="mx-auto mt-8 max-w-7xl">

			<section id="search" class="mb-7 flex items-center justify-center">
				<div class="flex relative w-full items-center justify-center max-w-lg">
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round" class="lucide lucide-search-icon lucide-search absolute left-3">
						<title>Icono search</title>
						<path d="m21 21-4.34-4.34" />
						<circle cx="11" cy="11" r="8" />
					</svg>
					<input id="searchInput" name="pokemonSearch" type="text" placeholder="Search Pokemon by name or Pokedex number"
						class="w-full max-w-lg rounded-lg border-2 border-slate-800 px-4 py-2 outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-300 pl-10">
				</div>
			</section>

			<section id="list-section">
				<div id="container" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
				</div>
			</section>

			<section id="controls" class="mt-10 flex items-center justify-between pb-6 md:pb-10">
				<button id="prevBtn" type="button"
					class="rounded-lg border border-blue-600 bg-white text-blue-600 px-5 py-2 font-semibold shadow transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:opacity-40">
					Prev
				</button>

				<button id="nextBtn" type="button"
					class="rounded-lg border bg-blue-600 px-5 py-2 font-semibold text-blue-100 shadow-lg transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-40">
					Next
				</button>
			</section>

		</main>
	</div>

</body>

</html>
