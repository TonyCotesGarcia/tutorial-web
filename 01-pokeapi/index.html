<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="index.js" defer></script>

    <title>Pokemons</title>
</head>

<body class="min-h-screen bg-slate-100 p-4 md:p-8">

    <div class="min-h-[calc(100vh-4rem)] rounded-3xl border-2 border-slate-800 bg-white p-6 md:p-10">

        <header class="rounded-3xl border-2 border-slate-800 bg-blue-800 p-6 text-blue-100 shadow-lg md:p-8">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold md:text-4xl">Pokemons</h1>
                    <h3 class="mt-5 text-sm font-semibold md:text-base">
                        All pokemons ......
                    </h3>
                </div>

                <button
                    id="headerBtn"
                    class="rounded-xl border-2 border-blue-100 bg-white px-5 py-2 font-semibold text-blue-800 transition hover:bg-blue-100">
                    button
                </button>
            </div>
        </header>

        <main class="mx-auto mt-8 max-w-7xl">

            <section id="search" class="mb-7">
                <input
                    id="searchInput"
                    name="pokemonSearch"
                    type="text"
                    placeholder="Search Pokemon by name or Pokedex number"
                    class="w-full max-w-lg rounded-lg border-2 border-slate-800 px-4 py-2 text-center outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-300">
            </section>

            <section id="list-section">
                <div
                    id="container"
                    class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
                </div>
            </section>

            <section id="controls" class="mt-10 flex items-center justify-between">
                <button
                    id="prevBtn"
                    class="rounded-lg border-2 border-slate-800 bg-white px-5 py-2 font-semibold shadow transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:opacity-40">
                    Prev
                </button>

                <button
                    id="nextBtn"
                    class="rounded-lg border-2 border-blue-950 bg-blue-800 px-5 py-2 font-semibold text-blue-100 shadow-lg transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-40">
                    Next
                </button>
            </section>

        </main>
    </div>

</body>
</html>
